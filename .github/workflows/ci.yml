name: CI

# 이대리 검증 게이트 — CLAUDE.md §2 #2 "3중 green"(lint:check + test + build) +
# §2 #7 "env 동기"(check:env)를 push/PR 마다 자동 강제한다.
# 배포는 포함하지 않는다(org 규칙 §9: prod 배포 자동화 금지). 검증 전용.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # PrismaClient 타입 생성 — lint/test/build 가 @prisma/client 타입에 의존하므로 선행.
      # schema 파싱만 하면 되고 DB 연결은 불필요하다.
      - name: Generate Prisma client
        run: pnpm prisma:generate

      # env 드리프트 게이트 (.env.example ↔ src/config/app.config.ts).
      - name: Check env sync
        run: pnpm check:env

      # docs-as-code 드리프트 게이트 (docs/*-catalog.md ↔ 코드 SoT).
      - name: Check docs sync
        run: pnpm docs:check

      - name: Lint
        run: pnpm lint:check

      # tree-sitter 네이티브 애드온은 jest 의 파일별 모듈 샌드박스에서 한 워커 프로세스에 2번째로
      # 로드될 때 네이티브 상태가 깨져 parse() 가 rootNode=undefined 를 반환한다(node-tree-sitter +
      # jest 멀티컨텍스트 이슈). 워커가 여러 tree-sitter spec 을 한 프로세스에 처리하면 2번째가 실패
      # (2-core CI·macOS 다코어 병렬 모두 재현). package.json 의 `test` 스크립트가 code-graph 를 제외한
      # 전체를 고속 병렬로 돌린 뒤, code-graph spec 만 --workerIdleMemoryLimit 로 파일마다 워커를 재시작
      # (native 매번 fresh 로드)해 해소한다 — 전체 스위트에 재시작 비용을 물리지 않아 로컬·CI 모두 빠름.
      # 로컬 `pnpm test` 와 CI 가 같은 설정을 공유. 코드는 정상이라 무변경. 근본 원인 규명: #84.
      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
